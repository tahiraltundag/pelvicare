databases:
  - name: pelvicare-db
    databaseName: pelvicare
    user: pelvicare
    region: frankfurt

services:
  - type: web
    name: pelvicare-api
    env: node
    region: frankfurt
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node utils/seed.js
    startCommand: node index.js
    healthCheckPath: /api/cms
    envVars:
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: pelvicare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
